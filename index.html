      <div style="font-weight:600;color:var(--brown)">👑 ${t('alreadyMember')}</div>
      <div class="num" style="font-size:15px;color:var(--rose-gold);font-weight:700;margin-top:4px">${cust.paidMembership.discountPercent}% ${state.settings.language==='zh'?'折扣':'off every visit'}</div>
      <div class="muted num" style="font-size:12.5px;margin-top:6px">${t('memberBalanceLabel')}: <span style="font-weight:700;color:var(--brown)">${fmtMoney(cust.paidMembership.balance)}</span></div>
      <div class="link" style="font-size:12px;margin-top:8px">${t('viewWalletDetails')}</div>
    </div>` : ""}
  ${state.settings.memberPromotionEnabled && vis.memberPromo? (()=>{
    const isZh=state.settings.language==='zh';
    const points=computeCustomerPoints(cust);
    const {current}=currentTierFor(points);
    const applicable=getApplicableMemberPromos(cust);
    return `<div class="section-title" style="color:var(--brown)">👑 ${t('memberBenefitsTitle')}</div>
    ${applicable.length? `<div class="card cust-card">
      <div class="muted" style="font-size:12px;margin-bottom:8px">${isZh?current.name_zh:current.name_en} ${t('enjoyThisMonth')}：</div>
      ${applicable.map(mp=>{
        const label = mp.discountType==='percent'? `${esc(isZh?mp.name_zh:mp.name_en)} ${mp.discountValue}% OFF`
          : mp.discountType==='fixed'? `${esc(isZh?mp.name_zh:mp.name_en)} ${fmtMoney(mp.discountValue)} OFF`
          : `${esc(isZh? (mp.freeText_zh||mp.name_zh) : (mp.freeText_en||mp.name_en))}`;
        return `<div style="font-size:13.5px;padding:4px 0">✔ ${label}</div>`;
      }).join("")}
    </div>` : `<div class="empty"><div class="sparkle">👑</div>${t('noMemberBenefits')}</div>`}`;
  })() : ""}
  ${state.settings.packagePromotionEnabled && vis.package? (()=>{
    const myPkgs=d.customerPackages.filter(cp=>cp.customerId===cust.id);
    return `<div class="section-title" style="color:var(--brown)">📦 ${t('myPackageTitle')}</div>
    ${myPkgs.length? myPkgs.map(cp=>`
      <div class="card cust-card">
        <div style="font-weight:600;color:var(--brown)">${esc(cp.name)}</div>
        <div class="num" style="font-size:13px;margin-top:4px">${cp.remainingSessions} / ${cp.totalSessions} ${t('packageRemaining')}</div>
        <div class="muted num" style="font-size:11px;margin-top:2px">${t('packagePurchaseDate')}: ${esc(fmtDate(cp.purchaseDate))}${cp.expiryDate? ` · ${t('expiryDate')}: ${esc(fmtDate(cp.expiryDate))}`:""}</div>
        ${(cp.usageLog||[]).length? `<div class="muted" style="font-size:11px;margin-top:6px">${(cp.usageLog||[]).slice().reverse().map(u=>`${esc(fmtDate(u.date))} · ${esc(u.serviceName||"")}`).join("<br>")}</div>`:""}
      </div>`).join("") : `<div class="empty"><div class="sparkle">📦</div>${t('noPackages')}</div>`}`;
  })() : ""}
  ${(()=>{
    const myGifts=d.gifts.filter(g=>g.customerId===cust.id).sort((a,b)=>(b.giftDate||"").localeCompare(a.giftDate||""));
    return `<div class="section-title" style="color:var(--brown)">🎀 ${t('myGiftsTitle')}</div>
    ${myGifts.length? myGifts.map(g=>`
      <div class="card cust-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-weight:600;color:var(--brown)">${esc(g.name)}${g.quantity>1?` × ${g.quantity}`:""}</div>
            ${g.giftType? `<div class="muted" style="font-size:12.5px">🎁 ${esc(g.giftType)}</div>`:""}
            ${g.giftDate? `<div class="muted num" style="font-size:11.5px">${esc(fmtDate(g.giftDate))}</div>`:""}
          </div>
          <span class="pill ${g.claimed?'pill-completed':'pill-upcoming'}">${g.claimed?t('giftClaimedYes'):t('giftClaimedNo')}</span>
        </div>
      </div>`).join("") : `<div class="empty"><div class="sparkle">🎀</div>${t('noGifts')}</div>`}`;
  })()}
  ${renderShareRewardsCard(cust)}
  `;
}
function renderShareRewardsCard(cust){
  const sr=state.settings.shareRewards;
  if(!sr.enabled) return "";
  const isZh=state.settings.language==='zh';
  const follow=cust.socialFollow||{};
  const fp=computeFollowProgress(cust);
  const prog=computeShareProgress(cust);
  const shareTypesEnabled=SHARE_TYPES.filter(t2=>sr.platforms[shareTypePlatform(t2)]);

  return `
  <div class="section-title" style="color:var(--brown)">${t('shareRewardsTitle')}</div>
  <div class="card cust-card">
    <div style="font-weight:600;color:var(--brown);font-size:13px;margin-bottom:4px">📱 ${t('followSocialTitle')}</div>
    <p class="muted" style="font-size:11.5px;margin-bottom:10px">${t('followRuleHint')}</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">
      ${fp.enabled.map(p=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:12px;background:${follow[p]?'var(--blush-soft)':'var(--cream-2)'}">
          <div>
            <div style="font-size:13px;font-weight:500">${t('platform_'+p)}</div>
            <div class="muted" style="font-size:11px">${esc(sr.accounts[p]||'')}</div>
          </div>
          <span style="font-size:12.5px;font-weight:600;color:${follow[p]?'var(--ok)':'var(--brown-2)'}">${follow[p]?'✅':'⏳'} ${follow[p]?t('followed'):t('notFollowed')}</span>
        </div>`).join("")}
    </div>
    <div class="num" style="font-size:12.5px;font-weight:600;color:var(--brown);margin-bottom:16px">
      ${fp.complete? t('followTaskCompleted') : `${t('followProgress')}: ${fp.followedCount} / ${fp.required}`}
    </div>

    <div style="font-weight:600;color:var(--brown);font-size:13px;margin-bottom:8px">📸 ${t('shareReviewTitle')}</div>
    <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px">
      ${shareTypesEnabled.map(t2=>`
        <div style="display:flex;justify-content:space-between;font-size:12.5px">
          <span class="muted">${t('shareType_'+t2)}</span>
          <span class="num" style="font-weight:600;color:var(--brown)">${prog.counts[t2]||0} ${t('timesUnit')}</span>
        </div>`).join("")}
      ${!shareTypesEnabled.length? `<div class="muted" style="font-size:12px">${t('noSharesYet')}</div>`:""}
    </div>

    <div style="font-weight:600;color:var(--brown);font-size:13px;margin-bottom:8px">${t('shareProgressTitle')}</div>
    ${prog.cycleComplete? `
      <div class="pill pill-completed">${t('allRewardsClaimed')}</div>
    ` : `
      <div style="background:var(--line);border-radius:999px;height:12px;overflow:hidden;margin-bottom:8px">
        <div style="background:linear-gradient(90deg,var(--rose-gold),var(--brown));height:100%;width:${Math.min(100,Math.round(prog.activeShares/prog.goal.threshold*100))}%"></div>
      </div>
      <div class="num" style="font-size:14px;font-weight:600;color:var(--brown);margin-bottom:6px">${prog.activeShares} / ${prog.goal.threshold} ${t('timesUnit')}</div>
      ${prog.eligible
        ? `<div style="font-size:13px;color:var(--ok);font-weight:600">${t('eligibleForReward')}</div>`
        : `<div class="muted" style="font-size:12.5px">${t('moreSharesToGo').replace('{n}', prog.goal.threshold-prog.activeShares)}</div>`}
    `}
  </div>
  `;
}
function renderCustProfile(cust){
  const vis=state.settings.customerVisibility;
  const d=state.data;
  const myAppts=d.appointments.filter(a=>a.customerId===cust.id);
  const completed=myAppts.filter(a=>a.status==="completed").length;
  const upcoming=myAppts.filter(a=>a.status==="upcoming").length;
  const wishlistCount=(cust.wishlist||[]).length;
  const points=computeCustomerPoints(cust);
  const {current}=currentTierFor(points);
  const tierLabel=state.settings.language==='zh'? current.name_zh : current.name_en;
  const joined=cust.createdAt? fmtDateTime(cust.createdAt).split(',')[0] : "-";
  const isZh=state.settings.language==='zh';

  return `
  <div class="journey-card" style="text-align:center">
    <div style="position:relative;display:inline-block;margin-bottom:10px" onclick="document.getElementById('pf_photo_file').click()">
      <div class="avatar" id="pf_avatar_display" style="width:76px;height:76px;font-size:28px;background:rgba(255,255,255,.6);cursor:pointer">${photoSrc(cust.photo)?`<img src="${esc(photoSrc(cust.photo))}">`:esc((cust.name||"?")[0])}</div>
      <span style="position:absolute;bottom:-2px;right:-2px;background:var(--brown);color:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer">✎</span>
    </div>
    <input type="file" accept="image/*" id="pf_photo_file" style="display:none" onchange="handlePhotoUpload(event,'pf_photo').then(()=>refreshAvatarPreview('pf_photo','pf_avatar_display'))">
    <input type="hidden" id="pf_photo" value="${esc(cust.photo)}">
    <div class="muted" style="font-size:10.5px;opacity:.8;margin-bottom:10px">${t('tapToChangePhoto')}</div>
    <h2 style="margin-bottom:2px">${esc(cust.name)}</h2>
    <div style="font-size:12px;opacity:.85;margin-bottom:14px">${t('vipMemberLabel')}</div>
    <div style="display:flex;justify-content:center;gap:22px;margin-bottom:14px">
      <div><div class="num" style="font-weight:700;font-size:18px">⭐ ${points}</div><div style="font-size:10px;opacity:.8">${t('pointsUnit')}</div></div>
      <div><div style="font-weight:700;font-family:'Cormorant Garamond',serif;font-size:14px">🎁 ${tierLabel}</div></div>
      <div><div class="num" style="font-weight:700;font-size:13px">📅 ${esc(joined)}</div><div style="font-size:10px;opacity:.8">${t('joinedLabel')}</div></div>
    </div>
    <button class="btn btn-outline btn-sm" style="background:rgba(255,255,255,.5);border-color:rgba(255,255,255,.7)" onclick="showMemberCard('${cust.id}')">${t('memberCardBtn')}</button>
  </div>

  <div class="stat-mini-row">
    <div class="stat-mini"><div class="v">💅 ${completed}</div><div class="l">${t('statCompleted')}</div></div>
    <div class="stat-mini"><div class="v">❤️ ${wishlistCount}</div><div class="l">${t('statWishlist')}</div></div>
  </div>
  <div class="stat-mini-row">
    <div class="stat-mini"><div class="v">📅 ${upcoming}</div><div class="l">${t('statUpcoming')}</div></div>
    <div class="stat-mini"><div class="v">🎁 ${points}</div><div class="l">${t('statPoints')}</div></div>
  </div>

  <div class="card cust-card">
    <div class="field">
      <label class="field-label">${t('whatsapp')}</label>
      <input class="input" id="pf_wa" value="${esc(cust.whatsapp)}">
      <div class="muted" style="font-size:11px;margin-top:4px">📱 ${t('waHint')}</div>
    </div>
    <div class="field">
      <label class="field-label">${t('email')}</label>
      <input class="input" id="pf_email" value="${esc(cust.email)}">
      ${!cust.email? `<div class="muted" style="font-size:11px;margin-top:4px">✉️ ${t('emailHintEmpty')}</div>`:""}
    </div>
    <div class="field">
      <label class="field-label">🎂 ${t('birthday')}</label>
      <input class="input" type="date" id="pf_bday" value="${esc(cust.birthday)}">
      <div class="muted" style="font-size:11px;margin-top:4px">${state.settings.featureToggles.birthdayPromotion? t('birthdayHintOn') : t('birthdayHintOff')}</div>
    </div>
  </div>

  <div class="card cust-card">
    <div class="section-title" style="margin-top:0">❤️ ${t('preferenceTitle')}</div>
    <div class="field"><label class="field-label">${t('favShapeLabel')}</label>
      <select class="input" id="pf_shape">
        <option value="" ${!cust.favShape?'selected':''}>-</option>
        ${["almond","square","oval","round","coffin","stiletto"].map(k=>`<option value="${k}" ${cust.favShape===k?'selected':''}>${t('shape_'+k)}</option>`).join("")}
      </select></div>
    <div class="field"><label class="field-label">${t('favColorLabel')}</label><input class="input" id="pf_color" value="${esc(cust.favColor||'')}"></div>
    <div class="field" style="margin-bottom:0"><label class="field-label">${t('favStyleLabel')}</label><input class="input" id="pf_style" value="${esc(cust.favStyle||'')}"></div>
  </div>

  <button class="btn btn-champagne" style="width:100%;padding:14px" onclick="saveMyProfile()">${t('saveChangesBtn')}</button>
  `;
}
function showMemberCard(custId){
  const cust=state.data.customers.find(c=>c.id===custId);
  if(!cust) return;
  const points=computeCustomerPoints(cust);
  const {current}=currentTierFor(points);
  const tierLabel=state.settings.language==='zh'? current.name_zh : current.name_en;
  openModal(t('memberCardBtn'), `
    <div class="journey-card" style="text-align:center">
      <img src="${LOGO_SRC}" style="width:44px;margin-bottom:8px">
      <div class="avatar" style="width:60px;height:60px;font-size:22px;margin:0 auto 10px;background:rgba(255,255,255,.6)">${photoSrc(cust.photo)?`<img src="${esc(photoSrc(cust.photo))}">`:esc((cust.name||"?")[0])}</div>
      <h2 style="margin-bottom:2px">${esc(cust.name)}</h2>
      <div style="font-size:12px;opacity:.85;margin-bottom:10px">${esc(cust.phone)}</div>
      <div class="num" style="font-weight:700;font-size:16px">🎁 ${tierLabel} · ⭐ ${points} ${t('pointsUnit')}</div>
    </div>
    <p class="muted" style="text-align:center;margin-top:12px">${t('memberCardHint')}</p>
  `, ()=>false);
  hideModalSaveBtn();
}
function saveMyProfile(){
  const cust=state.data.customers.find(c=>c.id===state.session.customerId);
  cust.photo=document.getElementById("pf_photo").value.trim();
  cust.whatsapp=document.getElementById("pf_wa").value.trim();
  cust.email=document.getElementById("pf_email").value.trim();
  cust.birthday=document.getElementById("pf_bday").value;
  cust.favShape=document.getElementById("pf_shape").value;
  cust.favColor=document.getElementById("pf_color").value.trim();
  cust.favStyle=document.getElementById("pf_style").value.trim();
  scheduleSave(); showToast(t('savedOk')); render();
}

/* ---------------- boot ---------------- */
loadAll();
</script>
</body>
</html>
