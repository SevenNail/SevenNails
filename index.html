<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7Nails</title>
<meta name="theme-color" content="#B8825F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" id="appTouchIcon" href="">
<link rel="manifest" id="appManifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FAF1E6;
  --cream-2:#F3E6D6;
  --card:#FFFDF9;
  --ink:#3E2C22;
  --brown:#6B4A38;
  --brown-2:#8A6B54;
  --rose-gold:#B8825F;
  --blush:#DD9AA0;
  --blush-soft:#F3D9DC;
  --line:#E7D6C2;
  --ok:#7C9A78;
  --warn:#C97B4A;
  --danger:#C15B5B;
  --shadow: 0 10px 30px -14px rgba(107,74,56,.25);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Poppins',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
}
.serif{font-family:'Cormorant Garamond',serif;}
h1,h2,h3{font-family:'Cormorant Garamond',serif; font-weight:600; margin:0; font-variant-numeric:tabular-nums;}
.num{font-family:'Poppins',sans-serif; font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::selection{background:var(--blush-soft);}

/* ---------- utility ---------- */
.arc-divider{
  position:relative; height:26px; margin:6px auto; width:180px;
}
.arc-divider svg{width:100%;height:100%;display:block;}
.btn{
  border:none; border-radius:999px; padding:11px 22px; font-size:14px; font-weight:500;
  transition:transform .15s ease, box-shadow .15s ease; letter-spacing:.3px;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--rose-gold),var(--brown)); color:#fff; box-shadow:var(--shadow);}
.btn-primary:hover{box-shadow:0 14px 28px -12px rgba(107,74,56,.4);}
.btn-outline{background:transparent; border:1.4px solid var(--rose-gold); color:var(--brown);}
.btn-outline:hover{background:var(--blush-soft);}
.btn-ghost{background:transparent; color:var(--brown-2); padding:8px 14px;}
.btn-danger{background:var(--danger); color:#fff;}
.btn-sm{padding:7px 14px; font-size:12.5px; border-radius:999px;}
.pill{display:inline-block; padding:3px 12px; border-radius:999px; font-size:11.5px; font-weight:500;}
.pill-upcoming{background:#EAF1E8; color:var(--ok);}
.pill-completed{background:var(--blush-soft); color:var(--brown);}
.pill-cancelled{background:#F5E3E0; color:var(--danger);}
.pill-pending{background:#FBF0DC; color:var(--warn);}
.card{background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow);}
.input{
  width:100%; padding:14px 16px; border-radius:16px; border:1.4px solid var(--line);
  background:#fff; color:var(--ink); font-size:15px; outline:none;
}
@media (max-width:820px){ .input{ font-size:16px; } } /* prevents iOS auto-zoom on focus */
.input:focus{border-color:var(--rose-gold); box-shadow:0 0 0 3px rgba(184,130,95,.12);}
label.field-label{font-size:12.5px; color:var(--brown-2); margin-bottom:5px; display:block; font-weight:500;}
.field{margin-bottom:16px;}
.muted{color:var(--brown-2); font-size:13px;}
.link{color:var(--rose-gold); text-decoration:underline; cursor:pointer; background:none; border:none; font-size:13px;}
.toggle{position:relative; width:42px; height:24px; border-radius:999px; background:#E3D3C1; display:inline-block; cursor:pointer; transition:.2s;}
.toggle.on{background:var(--rose-gold);}
.toggle::after{content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:.2s;}
.toggle.on::after{left:21px;}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; color:var(--brown-2); font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; padding:10px 12px; border-bottom:1.5px solid var(--line);}
td{padding:11px 12px; border-bottom:1px solid var(--line); vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.avatar{width:38px;height:38px;border-radius:50%; background:var(--blush-soft); display:flex;align-items:center;justify-content:center; font-weight:600; color:var(--brown); overflow:hidden; flex-shrink:0;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.modal-backdrop{position:fixed; inset:0; background:rgba(62,44,34,.45); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; backdrop-filter:blur(2px);}
.modal{background:var(--card); border-radius:16px; padding:26px; width:100%; max-width:460px; max-height:88vh; overflow-y:auto; box-shadow:0 30px 60px -20px rgba(62,44,34,.5); position:relative;}
.modal-close-btn{position:absolute; top:18px; right:18px; width:28px; height:28px; border-radius:50%; border:none; background:var(--cream-2); color:var(--brown-2); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
.modal-close-btn:hover{background:var(--blush-soft); color:var(--brown);}
@media (max-width:480px){ .modal{ padding:20px 18px; border-radius:16px; } .modal-backdrop{ padding:12px; } }
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--brown); color:#fff; padding:12px 22px; border-radius:18px; font-size:13.5px; z-index:200; box-shadow:var(--shadow); opacity:0; transition:opacity .25s; max-width:min(92vw,480px); text-align:center; white-space:normal; word-break:break-word;}
.toast.show{opacity:1;}
.empty{text-align:center; padding:50px 20px; color:var(--brown-2);}
.empty .sparkle{font-size:34px; margin-bottom:8px;}

/* ---------- landing (customer-facing hero login) ---------- */
.landing{
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:30px; text-align:center; position:relative; overflow:hidden;
  background:var(--brown);
}
.landing-photos{position:absolute; inset:0; display:flex; z-index:0;}
.landing-photos img{width:33.34%; height:100%; object-fit:cover; filter:saturate(.92) brightness(.8) blur(2.5px);}
.landing-overlay{
  position:absolute; inset:0; z-index:1;
  background:
    radial-gradient(circle at 18% 14%, rgba(255,255,255,.22) 0%, transparent 42%),
    radial-gradient(circle at 86% 8%, rgba(255,255,255,.16) 0%, transparent 38%),
    linear-gradient(160deg, rgba(107,74,56,.72) 0%, rgba(184,130,95,.62) 55%, rgba(221,154,160,.62) 100%);
}
.landing-sparkle{position:absolute; z-index:2; pointer-events:none; color:#fff; filter:drop-shadow(0 0 6px rgba(255,255,255,.5)); animation:twinkle 3.2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.25; transform:scale(.8) rotate(0deg);} 50%{opacity:.95; transform:scale(1.2) rotate(12deg);}}
@keyframes floaty{0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);}}
.landing-card{
  position:relative; z-index:3; background:rgba(255,253,249,.95); backdrop-filter:blur(6px);
  border-radius:26px; padding:38px 30px 30px; width:100%; max-width:380px;
  box-shadow:0 30px 60px -20px rgba(62,44,34,.55); animation:floaty 6s ease-in-out infinite;
}
.logo-glow{position:relative; width:138px; height:138px; margin:0 auto 4px; display:flex; align-items:center; justify-content:center;}
.logo-glow::before{
  content:''; position:absolute; inset:-18px; border-radius:50%;
  background:radial-gradient(circle, rgba(232,196,155,.55) 0%, rgba(232,196,155,.18) 45%, transparent 72%);
  filter:blur(2px); animation:glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.7; transform:scale(1);} 50%{opacity:1; transform:scale(1.08);}}
.landing-card img.logo{width:129px; height:129px; object-fit:contain; position:relative; z-index:1;}
.landing-card .brand-sub{color:var(--rose-gold); font-size:11px; letter-spacing:2.5px; text-transform:uppercase; margin-top:-4px; margin-bottom:10px;}
.landing-card h2{color:var(--brown); font-size:23px; margin-bottom:4px;}
.landing-card .tag{color:var(--brown-2); font-size:12.5px; margin-bottom:22px; line-height:1.5;}
.phone-row{display:flex; gap:8px;}
.phone-row select{flex:0 0 92px; padding:10px 6px; border-radius:12px; border:1.4px solid var(--line); background:#fff; font-size:13.5px; color:var(--ink);}
.phone-row input{flex:1;}
.btn-champagne{background:linear-gradient(120deg,#E8C49B 0%, var(--rose-gold) 55%, var(--brown) 100%); color:#fff; box-shadow:var(--shadow);}
.landing-mascot{position:absolute; right:-14px; top:64px; width:64px; z-index:4; animation:floaty 4.5s ease-in-out infinite;}
.staff-link{position:fixed; bottom:14px; right:16px; font-size:11px; color:rgba(255,255,255,.55); background:none; border:none; cursor:pointer; z-index:3;}
.petal{position:absolute; z-index:2; pointer-events:none; opacity:.55; animation:driftDown linear infinite;}
@keyframes driftDown{
  0%{transform:translateY(-6vh) translateX(0) rotate(0deg); opacity:0;}
  10%{opacity:.55;}
  90%{opacity:.5;}
  100%{transform:translateY(106vh) translateX(24px) rotate(200deg); opacity:0;}
}
.lang-switch{position:fixed; top:18px; right:18px; display:flex; gap:6px; z-index:50;}
.lang-btn{background:#fff; border:1px solid var(--line); padding:6px 4px; min-width:44px; text-align:center; border-radius:999px; font-size:12px; color:var(--brown-2);}
.lang-btn.active{background:var(--brown); color:#fff; border-color:var(--brown);}

/* ---------- login ---------- */
.login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
.login-box{width:100%; max-width:380px; padding:36px 30px; text-align:center;}
.login-box img{width:80px; margin-bottom:6px;}
.back-link{position:fixed; top:18px; left:18px; z-index:50;}

/* ---------- admin shell ---------- */
.admin-shell{display:flex; min-height:100vh;}
.sidebar{width:230px; background:var(--brown); color:#fff; padding:26px 16px; flex-shrink:0; display:flex; flex-direction:column;}
.sidebar .brand{display:flex; align-items:center; gap:10px; margin-bottom:26px; padding:0 8px;}
.sidebar .brand img{width:36px;height:36px;border-radius:50%; background:#fff; object-fit:cover;}
.sidebar .brand span{font-family:'Cormorant Garamond',serif; font-size:19px;}
.nav-item{display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:12px; color:#EADFD3; font-size:13.5px; margin-bottom:3px; cursor:pointer; transition:.15s;}
.nav-item:hover{background:rgba(255,255,255,.08);}
.nav-item.active{background:rgba(255,255,255,.16); color:#fff; font-weight:500;}
.sidebar-footer{margin-top:auto; padding-top:16px; border-top:1px solid rgba(255,255,255,.15);}
.admin-main{flex:1; padding:26px 34px; overflow-x:hidden;}
.admin-topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
.admin-topbar h2{font-size:26px; color:var(--brown);}
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px;}
.stat-card{padding:20px; }
.stat-card .n{font-size:28px; font-family:'Poppins',sans-serif; font-variant-numeric:tabular-nums; color:var(--brown); font-weight:600;}
.stat-card .l{font-size:12.5px; color:var(--brown-2); margin-top:4px;}
.toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; flex-wrap:wrap;}
.search-input{max-width:260px;}
.section-title{font-size:15px; color:var(--brown); font-weight:600; margin:22px 0 10px;}

/* ---------- customer app ---------- */
.cust-app{max-width:460px; margin:0 auto; min-height:100vh; background:var(--cream); position:relative; padding-bottom:80px;}
.cust-header{
  background:linear-gradient(160deg,var(--brown) 0%, var(--rose-gold) 100%); color:#fff;
  padding:26px 22px 40px; border-radius:0 0 32px 32px; position:relative;
}
.cust-header .row1{display:flex; justify-content:space-between; align-items:flex-start;}
.cust-header h2{color:#fff; font-size:23px;}
.cust-header .sub{font-size:12.5px; opacity:.9; margin-top:4px;}
.cust-body{padding:0 18px; margin-top:22px;}
.cust-body > *:first-child{margin-top:0;}
.cust-card{padding:18px; margin-bottom:14px;}
.cust-scroll-row{display:flex; gap:12px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; touch-action:pan-x; position:relative; z-index:1;}
.journey-card{
  padding:20px; border-radius:20px; margin-bottom:14px; color:#4A362A;
  background:linear-gradient(120deg,#F3E3CB 0%, #E8C49B 55%, #D9A876 100%);
  box-shadow:0 14px 28px -14px rgba(184,130,95,.45);
}
.tier-badge{display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:999px; background:rgba(255,255,255,.55); font-size:12.5px; font-weight:600; color:var(--brown);}
.next-appt-card{padding:20px; border-radius:20px; margin-bottom:14px; background:linear-gradient(135deg,#fff,var(--cream-2)); border:1px solid var(--line);}
.stat-mini-row{display:flex; gap:10px; margin-bottom:14px;}
.stat-mini{flex:1; padding:14px 10px; border-radius:16px; background:var(--card); border:1px solid var(--line); text-align:center;}
.stat-mini .v{font-size:17px; font-family:'Poppins',sans-serif; font-variant-numeric:tabular-nums; font-weight:600; color:var(--brown);}
.stat-mini .l{font-size:10px; color:var(--brown-2); margin-top:2px;}
.wishlist-thumb{position:relative; min-width:96px; width:96px; height:96px; border-radius:14px; overflow:hidden; flex-shrink:0;}
.wishlist-thumb img{width:100%; height:100%; object-fit:cover;}
.wishlist-add{min-width:96px; width:96px; height:96px; border-radius:14px; border:1.6px dashed var(--rose-gold); display:flex; align-items:center; justify-content:center; color:var(--rose-gold); font-size:22px; flex-shrink:0; cursor:pointer; background:var(--blush-soft);}
.promo-card{min-width:210px; padding:16px; background:linear-gradient(135deg,var(--blush-soft),var(--cream-2)); border-radius:16px; flex-shrink:0; position:relative; z-index:2;}
.voucher-card{min-width:200px; padding:16px; border-radius:16px; border:1.6px dashed var(--rose-gold); background:#fff; flex-shrink:0; position:relative;}
.gallery-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
.gallery-grid img{width:100%; aspect-ratio:1; object-fit:cover; border-radius:12px;}
.bottom-nav{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:460px;
  background:rgba(255,253,249,.78); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-top:1px solid rgba(231,214,194,.6); box-shadow:0 -8px 24px -12px rgba(62,44,34,.18);
  display:flex; justify-content:space-around; padding:10px 6px 14px; z-index:40;
}
.nav-btn{display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; color:var(--brown-2); background:none; border:none; transition:.15s;}
.nav-btn.active{color:var(--brown); font-weight:600;}
.nav-btn.active .ic{transform:scale(1.12); filter:drop-shadow(0 2px 4px rgba(184,130,95,.4));}
.nav-btn .ic{font-size:18px; transition:.15s;}
.badge-count{background:var(--rose-gold); color:#fff; border-radius:999px; padding:1px 7px; font-size:10px;}
.timeline-item{display:flex; gap:12px; margin-bottom:16px;}
.timeline-dot{width:10px;height:10px; border-radius:50%; background:var(--rose-gold); margin-top:5px; flex-shrink:0;}
.timeline-line{width:1.5px; background:var(--line); flex:1; margin:2px auto;}
.fav-heart{cursor:pointer; font-size:15px;}
.wa-btn{display:inline-flex; align-items:center; gap:5px; background:#25D366; color:#fff; padding:6px 12px; border-radius:999px; font-size:12px; border:none;}
.sidebar-backdrop{display:none; position:fixed; inset:0; background:rgba(62,44,34,.45); z-index:55;}
@media (max-width:820px){
  .sidebar{position:fixed; left:-260px; top:0; bottom:0; z-index:60; transition:.25s;}
  .sidebar.open{left:0;}
  .sidebar.open ~ .sidebar-backdrop, .sidebar-backdrop.open{display:block;}
  .admin-main{padding:18px 14px;}
  .menu-toggle{display:inline-block !important;}
  .admin-topbar h2{font-size:21px;}
  .stat-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px;}
  .stat-card{padding:14px;}
  .stat-card .n{font-size:22px;}
  table{font-size:12.5px;}
  th,td{padding:8px 6px;}
  .toolbar{flex-direction:column; align-items:stretch;}
  .toolbar > div:first-child{width:100%;}
  .search-input{max-width:none;}
  .btn{padding:10px 18px;}
}
@media (max-width:480px){
  .landing-card{padding:30px 20px 24px; max-width:94vw;}
  .login-box{padding:28px 20px;}
  h2{font-size:19px !important;}
  .cust-header h2{font-size:20px !important;}
}
.menu-toggle{display:none; background:var(--brown); color:#fff; border:none; border-radius:10px; padding:8px 12px; font-size:16px;}
</style>
<meta name="apple-mobile-web-app-capable" content="yes">

<script>
/* ============================================================
   THE SEVEN NAIL STUDIO — management system (v2 — Supabase)

// ---------- Supabase client ----------
const SB_URL  = "https://inqzuqnybifozsivzmbk.supabase.co";
const SB_KEY  = "sb_publishable_l00hC5zq0Xa_1yVKRp9hIw_J7_MUaGX";
const sb = supabase.createClient(SB_URL, SB_KEY);

// ---------- Data mapping helpers (JS camelCase ↔ Postgres snake_case) ----------
function custToRow(c){
  return {
    id:c.id, name:c.name, phone:c.phone,
    whatsapp:c.whatsapp||null, email:c.email||null,
    gender:c.gender||null, birthday:c.birthday||null, note:c.note||null,
    photo_ref:c.photo||null, fav_shape:c.favShape||null,
    fav_color:c.favColor||null, fav_style:c.favStyle||null,
    favorites:c.favorites||[], wishlist:c.wishlist||[],
    social_follow:c.socialFollow||{}, share_log:c.shareLog||[],
    share_claimed_tier_ids:c.shareClaimedTierIds||[],
    share_claim_history:c.shareClaimHistory||[],
    share_cycle_start:c.shareCycleStart||0,

function rowToCust(r){

    photo:r.photo_ref||'', favShape:r.fav_shape||'',
    favColor:r.fav_color||'', favStyle:r.fav_style||'',
    favorites:r.favorites||[], wishlist:r.wishlist||[],
    socialFollow:r.social_follow||{}, shareLog:r.share_log||[],
    shareClaimedTierIds:r.share_claimed_tier_ids||[],
    shareClaimHistory:r.share_claim_history||[],
    shareCycleStart:r.share_cycle_start||0,
    pointsAdjustment:r.points_adjustment||0,
    redeemedTiers:r.redeemed_tiers||[],
    notifyReminder: r.notify_reminder!==false,
    paidMembership: r.paid_membership || null,
    createdAt:r.created_at||Date.now(),
  };
}
function apptToRow(a){
  return {
    id:a.id, customer_id:a.customerId||null,
    service_ids:a.serviceIds||[], line_items:a.lineItems||[],
    service_text:a.serviceText||null,
    date:a.date||null, time:a.time||null,
    status:a.status||'upcoming', payment_method:a.paymentMethod||'cash',
    staff_name:a.staffName||null,
    amount:a.amount||0, subtotal:a.subtotal||0, discount:a.discount||0,
    note:a.note||null, reminder_sent:!!a.reminderSent, package_instance_id:a.packageInstanceId||null,
    membership_purchase_amount:a.membershipPurchaseAmount||0,
    top_up_amount:a.topUpAmount||0,
    balance_before: (a.balanceBefore!=null? a.balanceBefore : null),
    balance_used: (a.balanceUsed!=null? a.balanceUsed : null),
    balance_remaining: (a.balanceRemaining!=null? a.balanceRemaining : null),
    created_at:a.createdAt||Date.now(),
  };
}
function rowToAppt(r){
  return {
    id:r.id, customerId:r.customer_id||'',
    serviceIds:r.service_ids||[], lineItems:r.line_items||[],
    serviceText:r.service_text||'',
    date:r.date||'', time:r.time||'',
    status:r.status||'upcoming', paymentMethod:r.payment_method||'cash',
    staffName:r.staff_name||'',
    amount:Number(r.amount)||0, subtotal:Number(r.subtotal)||0, discount:Number(r.discount)||0,

// ---------- Local backup (safety net so data is never silently lost) ----------
// Every time we schedule/force a save, we also instantly snapshot the
// in-memory state to localStorage. This is synchronous and never fails
// due to network issues, so even if Supabase is unreachable or a save
// keeps failing, the data the person just typed is not lost — it will
// be recovered automatically next time the app loads (see loadAll()).
function backupLocalState(){
  try{
    localStorage.setItem("seven-local-backup", JSON.stringify({
      savedAt: Date.now(),
      data: state.data,
      settings: state.settings,
    }));
  }catch(e){ console.error("local backup failed", e); }
}
function loadLocalBackup(){
  try{
    const v = localStorage.getItem("seven-local-backup");
    return v ? JSON.parse(v) : null;
  }catch(e){ return null; }
}

// ---------- Supabase save ----------
let sbSaveTimer=null;
function scheduleSave(){
  backupLocalState();
  clearTimeout(sbSaveTimer);
  sbSaveTimer=setTimeout(()=>saveToSupabase(), 800);
}
function immediateSave(){
  backupLocalState();
  clearTimeout(sbSaveTimer);
  sbSaveTimer=null;
  saveToSupabase();
}
// Flush any pending save immediately if the person navigates away, closes
// the tab, switches apps, or logs out — instead of losing up to 800ms of
// edits to a debounce timer that never got the chance to fire.
function flushPendingSave(){
  if(sbSaveTimer){ clearTimeout(sbSaveTimer); sbSaveTimer=null; saveToSupabase(); }
}
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden") flushPendingSave(); });
window.addEventListener("pagehide", flushPendingSave);
window.addEventListener("beforeunload", flushPendingSave);

let isMigrationSave = false;
let saveRetryCount = 0;
async function saveToSupabase(){
  const d=state.data;
  const tables = [
    ['app_settings', ()=> sb.from('app_settings').upsert({id:'main', data:state.settings})],
    ['categories',   ()=> d.categories.length   ? sb.from('categories').upsert(d.categories)                           : null],
    ['quotes',       ()=> d.quotes.length        ? sb.from('quotes').upsert(d.quotes)                                   : null],
    ['promotions',   ()=> d.promotions.length    ? sb.from('promotions').upsert(d.promotions.map(promoToRow))           : null],
    ['customers',    ()=> d.customers.length     ? sb.from('customers').upsert(d.customers.map(custToRow))              : null],
    ['services',     ()=> d.services.length      ? sb.from('services').upsert(d.services.map(svcToRow))                 : null],
    ['appointments', ()=> d.appointments.length  ? sb.from('appointments').upsert(d.appointments.map(apptToRow))        : null],
    ['vouchers',     ()=> d.vouchers.length      ? sb.from('vouchers').upsert(d.vouchers.map(voucherToRow))             : null],
    ['gallery',      ()=> d.gallery.length       ? sb.from('gallery').upsert(d.gallery.map(galleryToRow))               : null],
    ['gifts',        ()=> d.gifts.length         ? sb.from('gifts').upsert(d.gifts.map(giftToRow))                     : null],
    ['packages',     ()=> d.packages.length      ? sb.from('packages').upsert(d.packages.map(packageToRow))            : null],
    ['customer_packages', ()=> d.customerPackages.length ? sb.from('customer_packages').upsert(d.customerPackages.map(custPkgToRow)) : null],
    ['member_promotions', ()=> d.memberPromotions.length ? sb.from('member_promotions').upsert(d.memberPromotions.map(memberPromoToRow)) : null],
  ];
  let anyError = false;
  let firstErrorDetail = "";
  for(const [name, fn] of tables){
    try{
      const op = fn();
      if(!op) continue;
      const res = await op;
      if(res && res.error){
        console.error('Save failed on table:', name, res.error);
        anyError = true;
        if(!firstErrorDetail) firstErrorDetail = `${name}: ${res.error.message||res.error.code||''}`;
      }
    }catch(e){
      console.error('Save exception on table:', name, e);
      anyError = true;
      if(!firstErrorDetail) firstErrorDetail = `${name}: ${e.message||e}`;
    }
  }
  if(anyError && !isMigrationSave){
    // Auto-retry a few times (transient network hiccups on mobile are common)
    // before bothering the person with an error toast.
    if(saveRetryCount < 3){
      saveRetryCount++;
      setTimeout(()=>saveToSupabase(), saveRetryCount*1500);
      return;
    }
    saveRetryCount = 0;
    console.error('Save giving up after retries. Last error:', firstErrorDetail);
    showToast(state.settings.language==='zh'
      ? `保存失败：${firstErrorDetail || '未知错误'}（资料已暂存于本机）`
      : `Save failed: ${firstErrorDetail || 'unknown error'} (your data is cached on this device)`, 6000);
  } else if(!anyError){
    saveRetryCount = 0;
  }
}
// Some in-memory collection keys are camelCase but their Supabase tables
// are snake_case — map those here so deletes hit the right table.
const TABLE_NAME_MAP = { customerPackages:'customer_packages', memberPromotions:'member_promotions' };
async function sbDeleteRow(table, id){
  const realTable = TABLE_NAME_MAP[table] || table;
  try{ await sb.from(realTable).delete().eq('id', id); }
  catch(e){ console.error('delete failed', e); }
}

// ---------- Supabase load ----------
async function loadAll(){
  let loadFailed = false;
  let needsResync = false;
  try{
    const [custR,catR,svcR,apptR,promoR,vouchR,galR,quoteR,settR,giftR,pkgR,custPkgR,memPromoR]=await Promise.all([
      sb.from('customers').select('*'),
      sb.from('categories').select('*'),
      sb.from('services').select('*'),
      sb.from('appointments').select('*'),
      sb.from('promotions').select('*'),
      sb.from('vouchers').select('*'),
      sb.from('gallery').select('*'),
      sb.from('quotes').select('*'),
      sb.from('app_settings').select('*').eq('id','main').maybeSingle(),
      sb.from('gifts').select('*'),
      sb.from('packages').select('*'),
      sb.from('customer_packages').select('*'),
      sb.from('member_promotions').select('*'),
    ]);
    if(custR.data)  state.data.customers    = custR.data.map(rowToCust);
    if(catR.data && catR.data.length)  state.data.categories   = catR.data;
    if(svcR.data && svcR.data.length)  state.data.services     = svcR.data.map(rowToSvc);
    if(apptR.data)  state.data.appointments = apptR.data.map(rowToAppt);
    if(promoR.data) state.data.promotions   = promoR.data.map(rowToPromo);
    if(vouchR.data) state.data.vouchers     = vouchR.data.map(rowToVoucher);
    if(galR.data)   state.data.gallery      = galR.data.map(rowToGallery);
    if(quoteR.data && quoteR.data.length) state.data.quotes = quoteR.data;
    if(settR.data && settR.data.data) state.settings = Object.assign(defaultSettings(), settR.data.data);
    if(giftR.data)  state.data.gifts        = giftR.data.map(rowToGift);
    if(pkgR.data)   state.data.packages     = pkgR.data.map(rowToPackage);
    if(custPkgR.data) state.data.customerPackages = custPkgR.data.map(rowToCustPkg);
    if(memPromoR.data) state.data.memberPromotions = memPromoR.data.map(rowToMemberPromo);
  }catch(e){
    console.error('Supabase load failed',e);
    loadFailed = true;
  }

  // ---------- Local-backup recovery ----------
  // Guards against the scenario where an earlier save silently failed
  // (bad connection, Supabase hiccup, etc.): the person typed something,
  // it never made it to the server, and a later reload would otherwise
  // show the old server copy as if the edit never happened.
  try{
    const backup = loadLocalBackup();
    if(backup && backup.data){
      if(loadFailed){
        // Couldn't reach Supabase at all — use the local backup as-is so
        // nothing appears to have vanished, and try to resync once online.
        state.data = Object.assign(defaultData(), backup.data);
        if(backup.settings) state.settings = Object.assign(defaultSettings(), backup.settings);
        needsResync = true;
        showToast(state.settings.language==='zh'
          ? "网络连线失败，已使用本机备份资料"
          : "Couldn't reach the server — using the local backup for now");
      }else{
        // Normal load succeeded — additively recover any records that exist
        // in the backup but are missing from the server (never got saved).
        ['customers','categories','services','appointments','promotions','vouchers','gallery','quotes','gifts','packages','customerPackages','memberPromotions'].forEach(key=>{
          if(!Array.isArray(backup.data[key])) return;
          const existingIds = new Set((state.data[key]||[]).map(x=>x.id));
          backup.data[key].forEach(item=>{
            if(item && item.id && !existingIds.has(item.id)){
              state.data[key].push(item);
              needsResync = true;
            }
          });
        });
        if(needsResync){
          showToast(state.settings.language==='zh'
            ? "已自动恢复先前未同步的资料"
            : "Recovered some previously unsynced data");
        }
      }
    }
  }catch(e){ console.error('local backup recovery failed', e); }

  try{ await loadLocales(); }catch(e){ state.locales=DEFAULT_LOCALES; }
  try{ await loadPhotosFromSupabase(); }catch(e){}
  try{ loadRememberedPhone(); }catch(e){}
  try{ loadRememberedAdmin(); }catch(e){}

  isMigrationSave = true;
  migrateOldTierNames();
  migrateNewServiceCatalog();
  isMigrationSave = false;
  state.loaded=true;

  // Push any recovered data back up right away so the server catches up.
  if(needsResync) scheduleSave();

  // Auto-login the admin if "remember me" was checked last time.
  if(!state.session.type && rememberedAdmin.remember && rememberedAdmin.username){
    const found=state.settings.admins.find(a=>
      a.username.toLowerCase()===rememberedAdmin.username.toLowerCase() && a.password===rememberedAdmin.password);
    if(found){ state.session={type:"admin", adminUser:found.username, customerId:null}; state.adminTab="dashboard"; }
  }

  render();
}

// ---------- Home-screen icon / PWA manifest ----------
// Wires the salon logo (already loaded as LOGO_SRC) into the favicon,
// apple-touch-icon, and a manifest built on the fly (so "Add to Home
// Screen" on Android/Chrome shows the logo + "7Nails" as the name).
(function setupAppIcon(){
  try{
    const fav=document.getElementById("appFavicon");
    if(fav) fav.href=LOGO_SRC;
    const touch=document.getElementById("appTouchIcon");
    if(touch) touch.href=LOGO_SRC;
    const manifestLink=document.getElementById("appManifest");
    if(manifestLink){
      const manifest={
        name:"7Nails",
        short_name:"7Nails",
        start_url:".",
        display:"standalone",
        background_color:"#FAF1E6",
        theme_color:"#B8825F",
        icons:[
          {src:LOGO_SRC, sizes:"192x192", type:"image/png"},
          {src:LOGO_SRC, sizes:"512x512", type:"image/png"}
        ]
      };
      const blob=new Blob([JSON.stringify(manifest)], {type:"application/manifest+json"});
      manifestLink.href=URL.createObjectURL(blob);
    }
  }catch(e){ console.error("app icon setup failed", e); }
})();

function showToast(msg, durationMs){

  showToast._t=setTimeout(()=>el.classList.remove("show"), durationMs||1800);

function uid(){ return Math.random().toString(36).slice(2,10); }
function esc(s){ return (s===undefined||s===null)?"":String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmtMoney(n){ return "RM "+(Number(n)||0).toFixed(2); }
function todayStr(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}
function fmtDate(dateStr){
  if(!dateStr) return "";
  const d=new Date(dateStr+"T00:00:00");
  if(isNaN(d)) return dateStr;
  return d.toLocaleDateString(state.settings.language==='zh'?'zh-CN':'en-US', {day:'numeric', month:'short', year:'numeric'});
}
function fmtTime(timeStr){
  if(!timeStr) return "";
  const [h,m]=timeStr.split(":").map(Number);
  if(isNaN(h)) return timeStr;
  const d=new Date(); d.setHours(h,m||0,0,0);
  return d.toLocaleTimeString(state.settings.language==='zh'?'zh-CN':'en-US', {hour:'numeric', minute:'2-digit', hour12:true});
}
function computeRawPoints(cust){
  const d=state.data;
  const startDate=state.settings.tierStartDate || "0000-00-00";
  const done=d.appointments.filter(a=>a.customerId===cust.id && a.status==="completed" && a.date && a.date>=startDate);
  return Math.floor(done.reduce((s,a)=>s+(Number(a.amount)||0),0));
}
function computeCustomerPoints(cust){
  const adjustment=Number(cust.pointsAdjustment)||0;
  return Math.max(0, computeRawPoints(cust)+adjustment);
}
function currentTierFor(points){
  const tiers=[...state.settings.tiers].sort((a,b)=>a.threshold-b.threshold);
  let current=tiers[0];
  for(const tr of tiers){ if(points>=tr.threshold) current=tr; }
  const next=tiers.find(tr=>tr.threshold>points);
  return {current, next, tiers};
}
function getApplicableMemberPromos(cust){
  if(!state.settings.memberPromotionEnabled) return [];
  const points=computeCustomerPoints(cust);
  const {current}=currentTierFor(points);
  const now=todayStr();
  return state.data.memberPromotions.filter(mp=> mp.active
    && (mp.applicableTiers||[]).includes(current.id)
    && (!mp.startDate || mp.startDate<=now)
    && (!mp.endDate || mp.endDate>=now));
}
const SHARE_TYPES = ["instagram_story","instagram_post","facebook_story","facebook_post","tiktok","google_review"];
const FOLLOW_PLATFORMS = ["facebook","instagram","tiktok","rednote"];
function computeFollowProgress(cust){
  const sr=state.settings.shareRewards;
  const enabled=FOLLOW_PLATFORMS.filter(p=>sr.platforms[p]);
  const follow=cust.socialFollow||{};
  const followedCount=enabled.filter(p=>follow[p]).length;
  const required=Math.min(3, enabled.length);
  return {enabled, followedCount, required, complete: enabled.length>0 && followedCount>=required};
}
function shareTypePlatform(type){
  if(type.startsWith("instagram")) return "instagram";
  if(type.startsWith("facebook")) return "facebook";
  if(type==="tiktok") return "tiktok";
  if(type==="google_review") return "googleReview";
  return "";
}
function computeShareProgress(cust){
  const sr=state.settings.shareRewards;
  const log=cust.shareLog||[];
  const totalShares=log.length;
  const baseline=Number(cust.shareCycleStart)||0;
  const activeShares=Math.max(0, totalShares-baseline);
  const tiers=[...sr.tiers].sort((a,b)=>a.threshold-b.threshold);
  const claimedIds=cust.shareClaimedTierIds||[];
  const goal=tiers.find(tr=>!claimedIds.includes(tr.id) && tr.threshold>0) || null;
  const isLastTier = goal && tiers.indexOf(goal)===tiers.length-1;
  const eligible = goal? activeShares>=goal.threshold : false;
  const cycleComplete = !goal; // every tier in this cycle already claimed
  const counts={};
  SHARE_TYPES.forEach(t=>counts[t]=log.filter(l=>l.type===t).length);
  return {totalShares, activeShares, tiers, goal, isLastTier, eligible, cycleComplete, counts, claimedIds};
}

/* ---------------- photo storage ----------------
   Photos are NOT embedded in the main data blob (that blob is capped and
   shared across the whole salon, so large base64 images would blow past
   the size limit fast). Instead each photo is compressed client-side and
   saved under its own storage key ("photo-<id>"); records only keep a
   short "ref:<id>" pointer. photoSrc() resolves either a ref or a plain
   URL/data-URL typed in directly. */
let statePhotos = {};
function photoSrc(ref){
  if(!ref) return "";
  if(ref.indexOf("ref:")===0) return statePhotos[ref.slice(4)] || "";
  return ref;
}
function compressImageFile(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("read failed"));
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error("decode failed"));
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const canvas=document.createElement("canvas");
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}
async function readFileAsDataUrl(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=()=>reject(new Error("read failed"));
    r.readAsDataURL(file);
  });
}
let photoUploadQueue = Promise.resolve();
async function handlePhotoUpload(evt, inputId){
  const file=evt.target.files && evt.target.files[0];
  if(!file) return;
  photoUploadQueue = photoUploadQueue.then(()=>doPhotoUpload(file, inputId), ()=>doPhotoUpload(file, inputId));
  return photoUploadQueue;
}
async function doPhotoUpload(file, inputId){
  try{
    let dataUrl;
    const attempts = [ [1600,.9], [1100,.82], [700,.7] ];
    for(const [maxDim,q] of attempts){
      try{ dataUrl = await compressImageFile(file, maxDim, q); break; }
      catch(compressErr){ console.error("compress attempt failed:", compressErr); }
    }
    if(!dataUrl){ dataUrl = await readFileAsDataUrl(file); }
    const id=uid();
    let savedSeparately=false;
    try{
      await savePhotoToSupabase(id, dataUrl);
      savedSeparately=true;
    }catch(storageErr){ console.error("photo save failed:", storageErr); }
    let ref;
    if(savedSeparately){
      statePhotos[id]=dataUrl;
      ref="ref:"+id;
    }else if(dataUrl.length < 150000){
      ref=dataUrl;
    }else{
      showToast(state.settings.language==='zh'
        ? "照片暂时无法保存，请稍后再试一次"
        : "Photo couldn't be saved right now — please try again shortly");
      return;
    }
    const input=document.getElementById(inputId);
    if(input) input.value=ref;
    const preview=document.getElementById(inputId+"_preview");
    if(preview){ preview.src=dataUrl; preview.style.display="block"; }
    showToast(state.settings.language==='zh'?"照片已上传":"Photo uploaded");
  }catch(e){
    console.error("photo upload failed:", e);
    showToast(state.settings.language==='zh'?"照片上传失败，请再试一次":"Photo upload failed — please try again");
  }
}
function refreshAvatarPreview(inputId, displayId){
  const input=document.getElementById(inputId);

  const src=photoSrc(input.value);

function normalizePhone(p){
  let d=(p||'').replace(/\D/g,'');
  // Strip leading country code 60 or 65 (Malaysia / Singapore)
  if(d.startsWith('60') && d.length>=10) d=d.slice(2);
  else if(d.startsWith('65') && d.length>=9) d=d.slice(2);
  // Strip leading 0
  if(d.startsWith('0')) d=d.slice(1);
  return d;
}

function renderDashCalendar(d){
  const [y,m]=dashCalMonth.split("-").map(Number);
  const first=new Date(y, m-1, 1);
  const startDow=first.getDay();
  const daysInMonth=new Date(y, m, 0).getDate();
  const apptDates=new Set(d.appointments.map(a=>a.date));
  const todayKey=todayStr();
  const monthLabel=first.toLocaleDateString(state.settings.language==='zh'?'zh-CN':'en-US', {month:'long', year:'numeric'});
  const dowLabels=state.settings.language==='zh'? ['日','一','二','三','四','五','六'] : ['S','M','T','W','T','F','S'];
  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const dateStr=`${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const hasAppt=apptDates.has(dateStr);
    const isToday=dateStr===todayKey;
    const isSelected=dateStr===dashSelectedDate;
    cells+=`<div onclick="dashSelectDate('${dateStr}')" style="text-align:center;padding:6px 0;border-radius:8px;cursor:pointer;font-size:12px;position:relative;
      background:${isSelected?'var(--rose-gold)':isToday?'var(--blush-soft)':'transparent'};color:${isSelected?'#fff':'var(--ink)'}">
      ${day}${hasAppt?`<div style="width:4px;height:4px;border-radius:50%;background:${isSelected?'#fff':'var(--rose-gold)'};margin:2px auto 0"></div>`:""}
    </div>`;
  }
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <button class="btn btn-ghost btn-sm" onclick="dashChangeMonth(-1)">←</button>
    <span class="num" style="font-weight:600;font-size:13px;color:var(--brown)">${monthLabel}</span>
    <button class="btn btn-ghost btn-sm" onclick="dashChangeMonth(1)">→</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
    ${dowLabels.map(l=>`<div style="text-align:center;font-size:10px;color:var(--brown-2);font-weight:600">${l}</div>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
  `;
}
function renderDashDayList(d){

function dashSelectDate(dateStr){
  dashSelectedDate=dateStr;

function dashChangeMonth(delta){
  const [y,m]=dashCalMonth.split("-").map(Number);
  const nd=new Date(y, m-1+delta, 1);
  dashCalMonth=nd.getFullYear()+"-"+String(nd.getMonth()+1).padStart(2,'0');

function ckSubtotal(){
  const d=state.data;
  return Object.entries(checkoutState.selectedServices).reduce((sum,[sid,price])=>sum+(Number(price)||0),0);

function ckDisplayTotal(){
  const d=state.data;
  const subtotal=ckSubtotal();
  const discount=Number(checkoutState.discount)||0;
  const membershipFee=checkoutState.membershipPurchase? checkoutState.membershipPurchase.amount : 0;
  const topUpFee=checkoutState.topUp? checkoutState.topUp.amount : 0;
  if(checkoutState.useMemberBalance){
    return (checkoutState.balanceMixedRemainder||0) + membershipFee + topUpFee;

  return Math.max(0, subtotal-discount) + membershipFee + topUpFee;
}

function ckApplyPaidMembership(){

  if(!cust || !cust.paidMembership) return;
  checkoutState.useMemberBalance=false;

function ckUseMemberBalance(){
  const cust=state.data.customers.find(c=>c.id===checkoutState.customerId);
  if(!cust || !cust.paidMembership) return;
  const subtotal=ckSubtotal();
  // Always calculate the member discount first, then draw from the wallet
  // against the discounted price — matches the required flow exactly.
  const discount = Math.round(subtotal * cust.paidMembership.discountPercent) / 100;
  const netAmount = Math.max(0, subtotal - discount);
  const balance = cust.paidMembership.balance;
  const remainder = Math.max(0, netAmount - balance);
  checkoutState.useMemberBalance=true;
  checkoutState.discount=discount;
  checkoutState.paymentMethod='memberBalance';
  checkoutState.balanceMixedRemainder=remainder;
  if(!checkoutState.mixedPaymentMethod) checkoutState.mixedPaymentMethod='cash';
  render();
}

      if(!checkoutState.mixedPaymentMethod) checkoutState.mixedPaymentMethod='cash';

function ckSaveSale(){
  const d=state.data;
  if(!checkoutState.customerId){ showToast(t('pleaseSelectCustomer')); return; }
  const serviceIds=Object.keys(checkoutState.selectedServices);
  const usingPackage = checkoutState.paymentMethod==='package' && checkoutState.packageInstanceId;
  const joiningMembership = !!checkoutState.membershipPurchase;
  const toppingUp = !!checkoutState.topUp;
  if(!serviceIds.length && !checkoutState.packageJustPurchased && !usingPackage && !joiningMembership && !toppingUp){ showToast(t('pleaseSelectService')); return; }
  if(checkoutState.paymentMethod==='package' && !checkoutState.packageInstanceId){
    showToast(t('selectCustomerPackage')); return;
  }
  const cust=d.customers.find(c=>c.id===checkoutState.customerId);
  if(!cust) return;
  const subtotal=ckSubtotal();
  const discount=Number(checkoutState.discount)||0;
  const membershipFee = joiningMembership ? checkoutState.membershipPurchase.amount : 0;
  const topUpFee = toppingUp ? checkoutState.topUp.amount : 0;
  const today=new Date();
  const dateStr=checkoutState.saleDate || todayStr();
  const timeStr=today.toTimeString().slice(0,5);
  const paymentMethod=checkoutState.paymentMethod;
  const staffName=checkoutState.staffName||"";
  const apptId=uid();
  const lineItems=serviceIds.map(sid=>({serviceId:sid, price: checkoutState.selectedServices[sid]}));
  const displayLineItems=lineItems.map(li=>{ const s=d.services.find(x=>x.id===li.serviceId); return {name: s?svcName(s):"", price: li.price}; });
  let svcNamesJoined=displayLineItems.map(li=>li.name).filter(Boolean).join(", ");
  const isPackagePayment = paymentMethod==='package' && checkoutState.packageInstanceId;
  const purchasedPkg = isPackagePayment && checkoutState.packageJustPurchased
    ? d.customerPackages.find(cp=>cp.id===checkoutState.packageInstanceId) : null;
  if(!svcNamesJoined && isPackagePayment){
    const cpForName=purchasedPkg || d.customerPackages.find(cp=>cp.id===checkoutState.packageInstanceId);
    if(cpForName) svcNamesJoined=cpForName.name;
  }
  if(isPackagePayment && !checkoutState.packageJustPurchased){
    useCustomerPackageSession(checkoutState.packageInstanceId, svcNamesJoined, dateStr);
  }

  // ---- Work out what's actually charged today, and any member-balance bookkeeping ----
  let amountChargedToday;
  let balanceBefore=null, balanceUsed=null, balanceRemaining=null;
  let apptPaymentMethodOverride=null;
  const joiningUseNow = joiningMembership && checkoutState.membershipPurchase.useNow;
  const topUpUseNow = toppingUp && checkoutState.topUp.useNow;
  if(checkoutState.useMemberBalance && (cust.paidMembership || joiningUseNow || topUpUseNow)){
    const netAmount=Math.max(0, subtotal - discount);
    balanceBefore = joiningUseNow ? membershipFee : ((cust.paidMembership? cust.paidMembership.balance : 0) + (topUpUseNow? topUpFee : 0));
    balanceUsed = Math.min(balanceBefore, netAmount);
    balanceRemaining = Math.max(0, balanceBefore - balanceUsed);
    if(!joiningUseNow && cust.paidMembership){ cust.paidMembership.balance = balanceRemaining; }
    const cashRemainder = Math.max(0, netAmount - balanceUsed);
    amountChargedToday = (joiningUseNow? membershipFee : 0) + (topUpUseNow? topUpFee : 0) + cashRemainder;
    apptPaymentMethodOverride = (joiningUseNow || topUpUseNow) ? paymentMethod : (cashRemainder>0 ? checkoutState.mixedPaymentMethod : 'memberBalance');
  }else if(isPackagePayment){
    amountChargedToday = (purchasedPkg ? Math.max(0, (purchasedPkg.price||0) - discount) : 0) + membershipFee + topUpFee;
  }else{
    amountChargedToday = Math.max(0, subtotal - discount) + membershipFee + topUpFee;
  }
  const apptPaymentMethod = purchasedPkg ? (purchasedPkg.paymentMethod||'cash') : (apptPaymentMethodOverride || paymentMethod);

  const appt={
    id:apptId, customerId:checkoutState.customerId, serviceIds, lineItems,
    date:dateStr, time:timeStr, status:"completed",
    paymentMethod: apptPaymentMethod, staffName,
    amount: amountChargedToday, subtotal, discount, note:checkoutState.note.trim(),
    packageInstanceId: isPackagePayment? checkoutState.packageInstanceId : "",
    membershipPurchaseAmount: joiningMembership? membershipFee : 0,
    topUpAmount: toppingUp? topUpFee : 0,
    balanceBefore, balanceUsed, balanceRemaining,
  };
  d.appointments.push(appt);

  // ---- Joining paid membership this visit creates/refreshes her balance ----
  if(joiningMembership){
    const tier=checkoutState.membershipPurchase;
    cust.paidMembership = {amount:tier.amount, discountPercent:tier.discountPercent, balance: joiningUseNow? balanceRemaining : tier.amount, purchaseDate:dateStr, paymentMethod:apptPaymentMethod};
  }
  // ---- Topping up without using it immediately: simply add to her balance ----
  if(toppingUp && !topUpUseNow && cust.paidMembership){
    cust.paidMembership.balance = (cust.paidMembership.balance||0) + topUpFee;
  }

  if(checkoutState.photo.trim()){
    d.gallery.push({ id:uid(), customerId:checkoutState.customerId, appointmentId:apptId, photo:checkoutState.photo.trim(), serviceName:svcNamesJoined, date:dateStr, note:"" });
  }
  // Capture anything from checkoutState we still need to display, BEFORE
  // resetCheckout() wipes it — reading it after reset always comes up blank.
  const usedPkgForDisplay = isPackagePayment
    ? (purchasedPkg || d.customerPackages.find(cp=>cp.id===checkoutState.packageInstanceId))
    : null;
  const notedForDisplay = appt.note;
  const membershipForDisplay = joiningMembership ? {amount:membershipFee, discountPercent:checkoutState.membershipPurchase.discountPercent} : null;
  const topUpForDisplay = toppingUp ? {amount:topUpFee} : null;
  const balanceForDisplay = checkoutState.useMemberBalance ? {before:balanceBefore, used:balanceUsed, remaining:balanceRemaining} : null;
  immediateSave();
  resetCheckout();
  showApptCompletedModal(cust? cust.name : "", displayLineItems, subtotal, discount, amountChargedToday, apptPaymentMethod, staffName, usedPkgForDisplay, notedForDisplay, membershipForDisplay, balanceForDisplay, topUpForDisplay);
}

        <div style="display:flex;justify-content:space-between;padding:4px 0"><span class="muted">${t('amountPaidTodayLabel')}</span><span class="num" style="font-weight:700;color:var(--brown);font-size:18px">${fmtMoney(total)}</span></div>

function adjustCustomerPoints(custId){
  const c=state.data.customers.find(x=>x.id===custId);
  if(!c) return;
  const input=document.getElementById("pts_adjust_"+custId);
  const val=input? input.value.trim() : "";
  if(val===""){ return; }
  const desiredTotal=Math.max(0, parseInt(val)||0);
  const raw=computeRawPoints(c);
  c.pointsAdjustment=desiredTotal-raw;
  scheduleSave(); showToast(t('savedOk'));
  closeModal();
  openCustomerDetail(custId);
}

  d.setDate(d.getDate()+1);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');

function sendApptReminder(apptId){

function openAppointmentModal(id){
  const d=state.data;
  const a=id? d.appointments.find(x=>x.id===id) : {customerId:"",serviceText:"",date:"",time:"",status:"upcoming",paymentMethod:"cash",amount:0,note:"",staffName:""};
  const existingCust=a.customerId? d.customers.find(c=>c.id===a.customerId) : null;
  openModal(id?t('edit')+" "+t('appointments'):t('addAppointment'), `
    <input type="hidden" id="f_custid" value="${esc(a.customerId||'')}">
    <div class="field" style="position:relative">
      <label class="field-label">${t('customer')} ${t('requiredMark')}</label>
      <input class="input" id="f_custname" placeholder="${t('custNamePlaceholder')}" autocomplete="off" value="${esc(existingCust?existingCust.name:'')}" oninput="apptAutocomplete(this.value)">
      <div id="f_cust_suggestions" style="position:relative"></div>
    </div>
    <div class="field"><label class="field-label">${t('phone')}</label>
      <input class="input num" id="f_custphone" placeholder="${t('custPhonePlaceholder')}" value="${esc(existingCust?existingCust.phone:'')}"></div>
    <div id="f_new_cust_hint" class="muted" style="font-size:11.5px;margin:-10px 0 14px;${a.customerId?'display:none;':''}">${t('newCustomerHint')}</div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label class="field-label">${t('date')}</label><input class="input" type="date" id="f_date" value="${esc(a.date)}" onchange="apptCheckConflict()"></div>
      <div class="field" style="flex:1"><label class="field-label">${t('time')}</label><input class="input" type="time" id="f_time" value="${esc(a.time)}" onchange="apptCheckConflict()"></div>
    </div>
    <div class="field"><label class="field-label">${t('service')}</label>
      <input class="input" id="f_svctext" placeholder="${t('serviceTextPlaceholder')}" value="${esc(a.serviceText || (a.serviceIds||[]).map(sid=>{const s=d.services.find(x=>x.id===sid); return s?svcName(s):'';}).filter(Boolean).join(', '))}"></div>
    <div class="field"><label class="field-label">${t('depositLabel')}</label><input class="input num" type="number" step="0.01" id="f_amt" value="${a.amount||0}"></div>
    <div class="field"><label class="field-label">${t('staffLabel')}</label>
      <select class="input" id="f_staff" onchange="apptCheckConflict()">
        <option value="">${t('noStaff')}</option>
        ${state.settings.admins.map(ad=>`<option value="${esc(ad.username)}" ${a.staffName===ad.username?'selected':''}>${esc(ad.username)}</option>`).join("")}
      </select></div>
    <div id="f_conflict_warning" class="muted" style="font-size:12px;color:var(--warn);margin:-10px 0 14px;display:none;"></div>
    <div class="field"><label class="field-label">${t('paymentMethod')}</label>
      <select class="input" id="f_pay">
        <option value="" ${!a.paymentMethod?'selected':''}>—</option>
        <option value="cash" ${a.paymentMethod==='cash'?'selected':''}>${t('pay_cash')}</option>
        <option value="qr" ${a.paymentMethod==='qr'?'selected':''}>${t('pay_qr')}</option>
        <option value="bank" ${a.paymentMethod==='bank'?'selected':''}>${t('pay_bank')}</option>
      </select></div>
    <div class="field"><label class="field-label">${t('status')}</label>
      <select class="input" id="f_status">
        <option value="pending" ${a.status==='pending'?'selected':''}>${t('st_pending')}</option>
        <option value="upcoming" ${a.status==='upcoming'?'selected':''}>${t('st_upcoming')}</option>
        <option value="completed" ${a.status==='completed'?'selected':''}>${t('st_completed')}</option>
        <option value="cancelled" ${a.status==='cancelled'?'selected':''}>${t('st_cancelled')}</option>
      </select></div>
    <div class="field"><label class="field-label">${t('note')}</label><textarea class="input" id="f_anote" rows="2">${esc(a.note||"")}</textarea></div>
  `, ()=>{
    const name=document.getElementById("f_custname").value.trim();
    const phone=document.getElementById("f_custphone").value.trim();
    if(!name){ showToast(state.settings.language==='zh'?'请输入顾客姓名':'Please enter customer name'); return false; }
    let customerId=document.getElementById("f_custid").value;
    // If no matched existing customer, create one (phone required for a new record)
    if(!customerId){
      if(!phone){ showToast(state.settings.language==='zh'?'新顾客需要填写电话号码':'Phone number is required for a new customer'); return false; }
      const existing=d.customers.find(c=>c.phone.replace(/\s|-/g,"")===phone.replace(/\s|-/g,""));
      if(existing){ customerId=existing.id; }
      else{
        const newCust={id:uid(), name, phone, whatsapp:"", email:"", gender:"", birthday:"", note:"", photo:"", createdAt:Date.now(), favorites:[], notifyReminder:true};
        d.customers.push(newCust);
        customerId=newCust.id;
      }
    }
    const obj={
      customerId, serviceIds:[], serviceText:document.getElementById("f_svctext").value.trim(),
      date:document.getElementById("f_date").value,
      time:document.getElementById("f_time").value,
      amount:parseFloat(document.getElementById("f_amt").value)||0,
      paymentMethod:document.getElementById("f_pay").value,
      status:document.getElementById("f_status").value,
      staffName:document.getElementById("f_staff").value,
      note:document.getElementById("f_anote").value.trim(),
    };
    if(id){ Object.assign(a,obj); }
    else{ d.appointments.push(Object.assign({id:uid()},obj)); }
    immediateSave(); showToast(t('savedOk')); state.adminTab="appointments"; render();
    return true;
  });
  setTimeout(apptCheckConflict, 0);
}
function apptAutocomplete(q){
  const box=document.getElementById("f_cust_suggestions");
  document.getElementById("f_custid").value="";
  document.getElementById("f_new_cust_hint").style.display = q.trim()? "block" : "none";
  if(!q.trim()){ box.innerHTML=""; return; }
  const matches=state.data.customers.filter(c=>(c.name+c.phone).toLowerCase().includes(q.toLowerCase())).slice(0,6);
  if(!matches.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div style="position:absolute;left:0;right:0;top:2px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:5;max-height:200px;overflow-y:auto">
    ${matches.map(c=>`
      <div style="padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--line)" onclick="apptSelectCustomer('${c.id}')">
        <div style="font-size:13.5px;font-weight:500">${esc(c.name)}</div><div class="muted num" style="font-size:11.5px">${esc(c.phone)}</div>
      </div>`).join("")}
  </div>`;
}
function apptSelectCustomer(custId){
  const c=state.data.customers.find(x=>x.id===custId);
  if(!c) return;
  document.getElementById("f_custid").value=c.id;
  document.getElementById("f_custname").value=c.name;
  document.getElementById("f_custphone").value=c.phone;
  document.getElementById("f_cust_suggestions").innerHTML="";
  document.getElementById("f_new_cust_hint").style.display="none";
}
function apptCheckConflict(){
  const warnEl=document.getElementById("f_conflict_warning");
  if(!warnEl) return;
  const date=document.getElementById("f_date").value;
  const time=document.getElementById("f_time").value;
  const staff=document.getElementById("f_staff").value;
  if(!date || !time || !staff){ warnEl.style.display="none"; return; }
  const conflict=state.data.appointments.some(x=>x.date===date && x.time===time && x.staffName===staff && x.status!=="cancelled");
  warnEl.style.display = conflict? "block" : "none";
  warnEl.textContent = conflict? t('conflictWarning') : "";
}

function addMonthsToDate(dateStr, months){
  const dt=new Date(dateStr+"T00:00:00");
  dt.setMonth(dt.getMonth()+Number(months||0));
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,'0')+"-"+String(dt.getDate()).padStart(2,'0');
}
function openSellPackageModal(custId, onDone, checkoutContext){
  const d=state.data;
  const isZh=state.settings.language==='zh';
  const active=d.packages.filter(p=>p.active);
  if(!active.length){ showToast(isZh?'目前没有已启用的配套，请先到「配套管理」新增':'No active packages yet — add one in Package Management'); return; }
  const first=active[0];
  openModal(t('sellPackageTitle'), `

      <select class="input" id="f_sellpkg" onchange="const p=state.data.packages.find(x=>x.id===this.value); if(p){ document.getElementById('f_sellprice').value=p.price; document.getElementById('f_sellsessions').value=p.totalSessions; }">
        ${active.map(p=>`<option value="${p.id}">${esc(p.name)} (${p.totalSessions}${isZh?'次':' sessions'} · ${fmtMoney(p.price)})</option>`).join("")}
      </select></div>
    <div style="display:flex;gap:10px">
      <div class="field" style="flex:1"><label class="field-label">${t('packagePrice')}</label><input class="input num" type="number" step="0.01" id="f_sellprice" value="${first.price}"></div>
      <div class="field" style="flex:1"><label class="field-label">${t('packageTotalSessions')}</label><input class="input num" type="number" min="1" id="f_sellsessions" value="${first.totalSessions}"></div>
    </div>

    <div class="field"><label class="field-label">${isZh?'这次配套费用的付款方式':'Payment method for this package'}</label>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px" id="f_sellpay_group">
        ${["cash","qr","bank"].map((p,i)=>`<button type="button" class="btn ${i===0?'btn-primary':'btn-outline'} sellpay-btn" data-val="${p}" style="padding:10px 6px" onclick="ckPickSellPayment(this)">${t('pay_'+p)}</button>`).join("")}
      </div>
      <input type="hidden" id="f_sellpay" value="cash">
    </div>
    ${checkoutContext? `
      <label style="display:flex;align-items:center;gap:8px;margin:4px 0 0;cursor:pointer">
        <input type="checkbox" id="f_selluse_now" checked style="width:16px;height:16px;accent-color:var(--rose-gold)">
        <span style="font-size:13px;color:var(--brown-2)">${isZh? `本次立即使用一次（今天做的：${esc(checkoutContext.serviceText||'-')}）` : `Use one session now (today's service: ${esc(checkoutContext.serviceText||'-')})`}</span>
      </label>` : ""}
  `, ()=>{
    const pkgId=document.getElementById("f_sellpkg").value;
    const tmpl=d.packages.find(x=>x.id===pkgId);
    if(!tmpl) return false;
    const purchaseDate=document.getElementById("f_selldate").value || todayStr();
    const totalSessions=parseInt(document.getElementById("f_sellsessions").value)||tmpl.totalSessions;
    const price=parseFloat(document.getElementById("f_sellprice").value)||tmpl.price;
    const expiryDate=tmpl.validMonths? addMonthsToDate(purchaseDate, tmpl.validMonths) : "";
    const paymentMethod=document.getElementById("f_sellpay").value||"cash";
    const useNowEl=document.getElementById("f_selluse_now");
    const useNow = checkoutContext && useNowEl && useNowEl.checked;
    const newPkg={
      id:uid(), customerId:custId, packageId:tmpl.id, name:tmpl.name,
      totalSessions, remainingSessions: useNow? totalSessions-1 : totalSessions,
      price, purchaseDate, expiryDate, paymentMethod,
      usageLog: useNow? [{date:checkoutContext.dateStr||purchaseDate, serviceName:checkoutContext.serviceText||"", remaining:totalSessions-1}] : [],
    };
    d.customerPackages.push(newPkg);
    scheduleSave(); showToast(t('savedOk'));
    if(onDone){ onDone(newPkg, useNow); } else { closeModal(); openCustomerDetail(custId); }
    return true;
  });
}

function useCustomerPackageSession(cpId, serviceText, dateStr){
  const cp=state.data.customerPackages.find(x=>x.id===cpId);
  if(!cp || cp.remainingSessions<=0) return false;
  cp.remainingSessions -= 1;
  cp.usageLog=cp.usageLog||[];
  cp.usageLog.push({date:dateStr, serviceName:serviceText, remaining:cp.remainingSessions});
  return true;
}

function toggleCustomerFollow(custId, platform){
  const c=state.data.customers.find(x=>x.id===custId);
  if(!c) return;
  c.socialFollow=c.socialFollow||{};
  c.socialFollow[platform]=!c.socialFollow[platform];
  scheduleSave(); showToast(t('savedOk'));
}
function confirmLogShares(custId){
  const c=state.data.customers.find(x=>x.id===custId);
  if(!c) return;
  const checked=Array.from(document.querySelectorAll(".share-check:checked")).map(el=>el.value);
  if(!checked.length){ showToast(state.settings.language==='zh'?'请先勾选本次的分享项目':'Please select at least one share'); return; }
  c.shareLog=c.shareLog||[];
  const today=todayStr();
  checked.forEach(type=>c.shareLog.push({id:uid(), type, date:today}));
  scheduleSave(); showToast(t('savedOk'));
  closeModal();
  openShareRewardsManage(custId);
}
function claimShareReward(custId){
  const c=state.data.customers.find(x=>x.id===custId);
  if(!c) return;
  const sr=state.settings.shareRewards;
  const prog=computeShareProgress(c);
  if(!prog.eligible || !prog.goal) return;
  openModal(t('markClaimed'), `<p>${state.settings.language==='zh'?'确认这位顾客已领取奖励？':'Confirm this customer has received the reward?'}</p>`, ()=>{
    c.shareClaimedTierIds=c.shareClaimedTierIds||[];
    c.shareClaimedTierIds.push(prog.goal.id);
    c.shareClaimHistory=c.shareClaimHistory||[];
    c.shareClaimHistory.push({tierId:prog.goal.id, reward_zh:prog.goal.reward_zh, reward_en:prog.goal.reward_en, claimedAt:Date.now()});
    if(prog.isLastTier){
      if(sr.cycleRepeat){ c.shareCycleStart=prog.totalShares; c.shareClaimedTierIds=[]; }
      // if not repeating, claimedTierIds keeps every tier id -> cycleComplete stays true forever
    }
    scheduleSave(); showToast(t('savedOk'));
    closeModal();
    openShareRewardsManage(custId);
    return true;
  });
}

/* ---- generic modal / delete ---- */
let modalStack=[];
function openModal(title, bodyHTML, onSave){
  const wrap=document.createElement("div");
  wrap.className="modal-backdrop";
  wrap.innerHTML=`<div class="modal">
    <button class="modal-close-btn" onclick="closeModal()">✕</button>
    <h3 style="color:var(--brown);margin-bottom:16px;padding-right:24px">${title}</h3>
    <div class="modal-body">${bodyHTML}</div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn btn-primary modal-save-btn" style="flex:1">${t('save')}</button>
      <button class="btn btn-outline" style="flex:1" onclick="closeModal()">${t('cancel')}</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  const saveBtn=wrap.querySelector(".modal-save-btn");
  saveBtn.onclick=()=>{ const ok=onSave(); if(ok!==false) closeModal(); };
  wrap.addEventListener("click", e=>{ if(e.target===wrap) closeModal(); });
  modalStack.push(wrap);
}
function closeModal(){
  const wrap=modalStack.pop();
  if(wrap) wrap.remove();
}
function hideModalSaveBtn(){
  const wrap=modalStack[modalStack.length-1];
  const btn=wrap && wrap.querySelector(".modal-save-btn");
  if(btn) btn.style.display="none";
}
function confirmDelete(coll, id){
  openModal(t('delete'), `<p>${t('confirmDelete')}</p>`, ()=>{
    const idx=state.data[coll].findIndex(x=>x.id===id);
    const rec = idx>-1? state.data[coll][idx] : null;
    if(idx>-1) state.data[coll].splice(idx,1);
    sbDeleteRow(coll, id);
    // If this record had its own uploaded photo (ref:<id>), delete that
    // photo row too so we don't leave orphaned rows in the photos table.
    const photoField = (rec && typeof rec.photo==="string" && rec.photo.indexOf("ref:")===0) ? rec.photo
      : (rec && typeof rec.image==="string" && rec.image.indexOf("ref:")===0) ? rec.image : null;
    if(photoField){
      const photoId = photoField.slice(4);
      sbDeleteRow('photos', photoId);
      delete statePhotos[photoId];
    }
    // Deleting a customer would otherwise leave orphaned rows in every table
    // that references customer_id, which violates foreign key constraints
    // on the next save. Cascade the delete through those tables too.
    if(coll==='customers'){
      ['appointments','gallery','gifts','customerPackages'].forEach(childColl=>{
        const remaining=[];
        state.data[childColl].forEach(row=>{
          if(row.customerId===id){ sbDeleteRow(childColl, row.id); }
          else{ remaining.push(row); }
        });
        state.data[childColl]=remaining;
      });
    }
    // Deleting an appointment would leave any gallery photo that was
    // attached to it pointing at a now-nonexistent appointment_id.
    if(coll==='appointments'){
      const remainingGallery=[];
      state.data.gallery.forEach(row=>{
        if(row.appointmentId===id){ sbDeleteRow('gallery', row.id); }
        else{ remainingGallery.push(row); }
      });
      state.data.gallery=remainingGallery;
    }
    scheduleSave(); showToast(t('deletedOk')); render();
    return true;
  });
}

function renderCustHome(cust){
  const d=state.data;
  const vis=state.settings.customerVisibility;
  const myAppts=d.appointments.filter(a=>a.customerId===cust.id);
  const upcoming=myAppts.filter(a=>a.status==="upcoming").sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))[0];
  let daysLeft=0, hoursLeft=0;
  if(upcoming && upcoming.date){
    const target=new Date(upcoming.date+"T"+(upcoming.time||"00:00"));
    const diffMs=target-new Date();
    daysLeft=Math.max(0, Math.floor(diffMs/86400000));
    hoursLeft=Math.max(0, Math.floor((diffMs%86400000)/3600000));
  }
  const activePromos=d.promotions.filter(p=>p.active);
  const myVouchers=d.vouchers.filter(v=>v.customerId===cust.id && !v.used);
  const done=myAppts.filter(a=>a.status==="completed").sort((a,b)=>b.date.localeCompare(a.date));
  const totalSpend=done.reduce((s,a)=>s+(Number(a.amount)||0),0);
  const thisYear=new Date().getFullYear();
  const designsThisYear=done.filter(a=>a.date && a.date.slice(0,4)===String(thisYear)).length;
  // consecutive-month streak, counting back from the current month
  let streak=0;
  if(done.length){
    const months=new Set(done.map(a=>a.date.slice(0,7)));
    let cursor=new Date();
    while(true){
      const key=cursor.getFullYear()+"-"+String(cursor.getMonth()+1).padStart(2,'0');
      if(months.has(key)){ streak++; cursor.setMonth(cursor.getMonth()-1); } else break;
    }
  }
  const wishlist=cust.wishlist||[];

  // membership tier, derived from points (RM1 = 1 point). Only spending on/after
  // tierStartDate counts, so backfilled historical records don't inflate the tier.
  let tierHtml="";
  if(vis.totalSpend){
    const points=computeCustomerPoints(cust);
    const {current, next}=currentTierFor(points);
    const tierLabel = state.settings.language==='zh'? current.name_zh : current.name_en;
    const nextName = next? (state.settings.language==='zh'? next.name_zh : next.name_en) : "";
    const progressLine = next
      ? (state.settings.language==='zh'
          ? `距离 ${nextName} 还差 ${next.threshold-points} 积分`
          : `${next.threshold-points} more points to ${nextName}`)
      : t('highestTierReached');
    const reward = state.settings.language==='zh'? current.reward_zh : current.reward_en;
    const redeemed=(cust.redeemedTiers||[]).includes(current.id);
    tierHtml=`<div style="text-align:center;margin-bottom:14px">
      <span class="tier-badge">${tierLabel} · ${points} ${t('pointsUnit')}</span>
      ${progressLine? `<div class="muted" style="font-size:11.5px;margin-top:6px">${progressLine}</div>`:""}
      ${reward? `
        <div style="margin-top:10px">
          ${redeemed
            ? `<span class="pill pill-completed">✓ ${t('redeemedLabel')}: ${esc(reward)}</span>`
            : `<div class="muted" style="font-size:12px;margin-bottom:6px">${t('rewardAvailable')}: ${esc(reward)}</div>
               <button class="btn btn-champagne btn-sm" onclick="redeemTierReward('${current.id}')">${t('redeemBtn')}</button>`}
        </div>` : ""}
    </div>`;
  }

  return `

function fmtDateTime(ts){
  if(!ts) return "";
  const d=new Date(ts);
  return d.toLocaleString(state.settings.language==='zh'?'zh-CN':'en-US', {year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function viewWishlistItemFor(custId, wid){
  const cust=state.data.customers.find(c=>c.id===custId);
  const w=cust && (cust.wishlist||[]).find(x=>x.id===wid);
  if(!w) return;
  openModal(t('wishlistTitle'), `
    <img src="${esc(photoSrc(w.photo))}" style="width:100%;border-radius:14px;margin-bottom:12px;cursor:zoom-in" onerror="this.style.opacity=.15" onclick="zoomImage('${esc(photoSrc(w.photo)).replace(/'/g,"\\'")}')">
    <div class="muted" style="font-size:11.5px;margin-bottom:6px">🕒 ${t('uploadedAt')}: ${esc(fmtDateTime(w.createdAt))}</div>
    <div style="font-size:13.5px">${esc(w.note) || `<span class="muted">${t('noNote')}</span>`}</div>
  `, ()=>false);
  hideModalSaveBtn();
}
function zoomImage(src){
  const wrap=document.createElement("div");
  wrap.className="modal-backdrop";
  wrap.style.background="rgba(0,0,0,.9)";
  wrap.style.padding="0";
  wrap.innerHTML=`<img src="${esc(src)}" style="max-width:96vw;max-height:92vh;object-fit:contain;border-radius:8px">`;
  wrap.addEventListener("click", ()=>wrap.remove());
  document.body.appendChild(wrap);
}
function viewWishlistItem(wid){ viewWishlistItemFor(state.session.customerId, wid); }
function openWishlistModal(){
  openModal(t('addWishlist'), `

    <div class="field"><label class="field-label">${t('wishlistNote')}</label><textarea class="input" id="f_wnote" rows="2"></textarea></div>
  `, ()=>{
    const photo=document.getElementById("f_wphoto").value.trim();

    const note=document.getElementById("f_wnote").value.trim();
    const cust=state.data.customers.find(c=>c.id===state.session.customerId);

function renderCustAppointments(cust){
  const vis=state.settings.customerVisibility;

  const all=d.appointments.filter(a=>a.customerId===cust.id);
  const pending=all.filter(a=>a.status==="pending").sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const upcoming=all.filter(a=>a.status==="upcoming").sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const completed=all.filter(a=>a.status==="completed").sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  const cancelled=all.filter(a=>a.status==="cancelled").sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  const next=upcoming[0];
  let nextDaysTxt=t('noneLabel');
  if(next){
    const diff=Math.max(0, Math.ceil((new Date(next.date)-new Date(new Date().toDateString()))/86400000));
    nextDaysTxt = state.settings.language==='zh' ? `${diff} 天后` : `in ${diff}d`;
  }
  const svcText=a=>a.serviceText || (a.serviceIds||[]).map(sid=>{const s=d.services.find(x=>x.id===sid); return s?svcName(s):"";}).filter(Boolean).join(", ")||"-";
  const waLink = state.settings.salonWhatsapp? `https://wa.me/${state.settings.salonWhatsapp.replace(/[^0-9]/g,"")}` : null;

  function apptCard(a, kind){
    const svcs=svcText(a);
    const borderColor = kind==='pending'? 'var(--warn)' : kind==='upcoming'? 'var(--ok)' : kind==='completed'? 'var(--rose-gold)' : 'var(--danger)';
    return `<div class="card cust-card" style="border-left:4px solid ${borderColor}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="font-weight:600;color:var(--brown)">💅 ${esc(svcs)}</div>
        <span class="pill pill-${a.status}">${t('st_'+a.status)}</span>
      </div>
      <div class="muted num" style="margin-top:6px;font-size:12.5px">📅 ${esc(fmtDate(a.date))} &nbsp; 🕒 ${esc(fmtTime(a.time))}</div>
      ${a.staffName? `<div class="muted" style="font-size:12.5px;margin-top:2px">👩 ${t('staffLabel')}: ${esc(a.staffName)}</div>`:""}
      ${(kind==='upcoming'||kind==='pending') && a.note? `<div class="muted" style="font-size:12px;margin-top:6px">📌 ${esc(a.note)}</div>`:""}
      ${kind==='upcoming'? `<div class="muted" style="font-size:11.5px;margin-top:6px">✨ ${t('arrivalNote')}</div>`:""}
      ${kind==='completed'? `<button class="link" style="margin-top:8px" onclick="setCustTab('myGallery')">${t('beautyJourneyTitle')} →</button>`:""}
      ${(kind==='upcoming'||kind==='pending')? `<button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="custCancelAppt('${a.id}')">${t('cancelApptBtn')}</button>`:""}
    </div>`;
  }

  const tabList = [
    ["pending", t('apptTabPending'), pending],
    ["upcoming", t('apptTabUpcoming'), upcoming],
    ["completed", t('apptTabCompleted'), completed],
    ["cancelled", t('apptTabCancelled'), cancelled],
  ];
  const current = tabList.find(x=>x[0]===custApptTab) || tabList[1];

  return `
  <div class="card cust-card" style="display:flex;justify-content:space-around;text-align:center">
    <div><div class="num" style="font-size:20px;font-weight:600;color:var(--brown)">${all.length}</div><div class="muted" style="font-size:11px">${t('totalApptLabel')}</div></div>
    <div><div class="num" style="font-size:20px;font-weight:600;color:var(--brown)">${next?nextDaysTxt:t('noneLabel')}</div><div class="muted" style="font-size:11px">${t('nextApptShort')}</div></div>
  </div>

  <div style="display:flex;gap:6px;margin-bottom:14px">
    ${tabList.map(([k,label,list])=>`
      <button class="btn btn-sm ${custApptTab===k?'btn-primary':'btn-outline'}" style="flex:1;font-size:10.5px;padding:8px 4px;line-height:1.3" onclick="setCustApptTab('${k}')">${label}<br>(${list.length})</button>
    `).join("")}
  </div>

  ${current[2].length? current[2].map(a=>apptCard(a,current[0])).join("") : `
    <div class="empty">
      <div class="sparkle">💅</div>
      ${custApptTab==='upcoming'? `
        <div>${t('noUpcomingAppt')}</div>
        <div style="margin-top:4px">${t('startNewBeauty')}</div>
        ${waLink? `<button class="btn btn-primary btn-sm" style="margin-top:14px" onclick="window.open('${waLink}','_blank')">${t('bookNowBtn')}</button>`:""}
      ` : custApptTab==='completed'? t('noAppt') : t('noCancelledAppt')}
    </div>`}
  `;
}
